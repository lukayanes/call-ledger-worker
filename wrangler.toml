name = "call-ledger-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

[observability]
enabled = true

  [observability.logs]
  invocation_logs = true
  head_sampling_rate = 1

[vars]
LEDGER_SHEET_NAME = "Call Ledger"
FIRST_DATA_ROW = "5"
GOOGLE_SHEET_ID = "15vdxFzjzQXHLVatFQyaMSfSMMf4deRq6CURkY6FuQQM"
GOOGLE_SERVICE_ACCOUNT_EMAIL = "ghl-call-leder@ghl-call-ledger.iam.gserviceaccount.com"

# Queue: same worker is both producer (webhook) and consumer (processing)
[[queues.producers]]
queue = "call-ledger-queue"
binding = "CALL_QUEUE"

[[queues.consumers]]
queue = "call-ledger-queue"
max_retries = 2
max_batch_timeout = 30

# Secrets (set via dashboard or `wrangler secret put`):
#   GHL_API_KEY
#   GHL_LOCATION_ID
#   ANTHROPIC_API_KEY
#   OPENAI_API_KEY
#   GOOGLE_PRIVATE_KEY
